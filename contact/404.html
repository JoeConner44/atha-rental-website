<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Redirecting... | Atha Equipment Rental</title>
  <script>
    // Map old URLs to new ones
    var redirects = {
      '/dumpster-rental':                 '/rentals/dumpsters/',
      '/equipment':                       '/rentals/heavy-equipment/',
      '/flooring-equipment':              '/rentals/flooring/',
      '/Lawn-and-Garden-Equipment':       '/rentals/lawn-garden/',
      '/lawn-and-garden-equipment':       '/rentals/lawn-garden/',
      '/other-equipment':                 '/rentals/other/',
      '/party-event-rental-equipment':    '/rentals/party/',
      '/toilets-holding-tanks':           '/rentals/toilets/',
      '/hours-and-location':              '/contact/',
      '/blog':                            '/blog/',
      '/service-areas':                   '/',
      '/media-room':                      '/blog/',
    };

    var path = window.location.pathname.replace(/\/$/, '');
    var dest = redirects[path] || redirects[path.toLowerCase()];

    if (dest) {
      window.location.replace(dest);
    } else {
      window.location.replace('/');
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
